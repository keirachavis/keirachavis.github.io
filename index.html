<style>

  .eyebrow{font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.14em;font-size:.7rem;color:var(--steel);font-weight:700;}

  .sheet{max-width:1080px;margin:0 auto;padding:0 28px;position:relative;}

  .sheet::before{left:0;} .sheet::after{right:0;}

  nav{position:sticky;top:0;z-index:60;background:var(--paper);border-bottom:1px solid var(--line);}
  .navwrap{max-width:1080px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:relative;}
  .navwrap .mono{font-size:.75rem;letter-spacing:.08em;cursor:pointer;background:none;border:none;color:var(--ink);}
  #menu-toggle{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--line);color:var(--ink);font-family:'Space Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;padding:7px 12px;border-radius:var(--radius);cursor:pointer;}
  #menu-toggle:hover{border-color:var(--accent);}
  #menu-dropdown{position:absolute;top:56px;right:28px;z-index:61;background:var(--panel);border:1px solid var(--ink);min-width:200px;box-shadow:0 8px 20px rgba(0,0,0,.12);display:none;}
  #menu-dropdown.open{display:block;}
  #menu-dropdown button{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;padding:12px 16px;cursor:pointer;color:var(--ink);}
  #menu-dropdown button:last-child{border-bottom:none;}
  #menu-dropdown button:hover{background:var(--steel-light);color:var(--accent4);}

  .view{display:none;padding:56px 0 40px;}
  .view.active{display:block;animation:viewIn .4s ease;}
  @keyframes viewIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){ .view.active{animation:none;} html{scroll-behavior:auto;} }

  .back-btn{display:inline-flex;align-items:center;gap:6px;margin-bottom:28px;font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;background:none;border:1px solid var(--line);color:var(--steel);padding:7px 12px;border-radius:var(--radius);cursor:pointer;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}

  h1.name{font-family:'Space Mono',monospace;font-size:clamp(2.6rem,7vw,4.4rem);font-weight:700;margin:10px 0 6px;letter-spacing:-.01em;line-height:1;}
  .role{font-size:1.15rem;color:var(--steel);font-weight:600;margin:0 0 18px;}
  .tagline{max-width:620px;color:#3a4350;}
  .bio-text{max-width:620px;color:#333;margin-top:14px;}

  .quicklinks{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px;}
  .quicklink-btn{font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;padding:11px 18px;border-radius:var(--radius);border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;text-decoration:none;display:inline-block;}
  .quicklink-btn.secondary{background:none;color:var(--ink);}
  .quicklink-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

  .titleblock{margin-top:44px;border-top:1px solid var(--ink);display:grid;grid-template-columns:repeat(4,1fr);}
  .titleblock div{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 16px;}
  .titleblock div:last-child{border-right:none;}
  .titleblock .tb-label{font-size:.62rem;letter-spacing:.1em;color:var(--steel);text-transform:uppercase;display:block;margin-bottom:4px;font-family:'Space Mono',monospace;}
  .titleblock .tb-value{font-size:.85rem;font-weight:600;}
  .titleblock a.tb-value{text-decoration:none;color:var(--ink);}
  .titleblock a.tb-value:hover{color:var(--accent);}

  .photo-card{margin-top:36px;border:1px solid var(--line);background:var(--panel);}
  .photo-carousel{position:relative;}
  .photo-slide-img{width:100%;height:260px;object-fit:cover;display:block;}
  .photo-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(28,36,48,.55);color:#fff;border:none;font-size:1.3rem;width:38px;height:38px;cursor:pointer;}
  .photo-nav.prev{left:0;} .photo-nav.next{right:0;}
  .photo-dots{display:flex;gap:6px;justify-content:center;padding:10px;}
  .photo-dot{width:6px;height:6px;border-radius:50%;background:var(--line);border:none;cursor:pointer;padding:0;}
  .photo-dot.active{background:var(--accent4);}

  .now-card{margin-top:36px;border:1px solid var(--ink);background:var(--panel);}
  .now-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
  .now-head h2{font-size:1.1rem;margin:0;}
  .now-carousel{display:flex;align-items:stretch;}
  .now-nav{background:none;border:none;font-size:1.3rem;color:var(--steel);cursor:pointer;padding:0 14px;}
  .now-nav:hover{color:var(--accent4);}
  .now-slide{flex:1;display:flex;gap:16px;padding:18px 8px;}
  .now-img{width:84px;height:84px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;}
  .now-date{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
  .now-text{font-size:.92rem;color:#2a2f36;margin-bottom:4px;}
  .now-with{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--steel);}
  .now-dots{display:flex;gap:6px;justify-content:center;padding-bottom:14px;}
  .now-dot{width:6px;height:6px;border-radius:50%;background:var(--line);border:none;cursor:pointer;padding:0;}
  .now-dot.active{background:var(--accent4);}

  .index-grid{margin-top:44px;border-top:1px solid var(--ink);}
  .index-item{display:flex;align-items:center;gap:20px;padding:20px 4px;border-bottom:1px solid var(--line);cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;transition:padding-left .25s ease,background .25s ease;}
  .index-item:hover{background:var(--panel);padding-left:16px;}
  .index-title{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;flex:1;}
  .index-arrow{font-family:'Space Mono',monospace;color:var(--steel);}

  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:32px;}
  .sec-num{font-family:'Space Mono',monospace;font-weight:700;font-size:.85rem;}
  h2{font-family:'Space Mono',monospace;font-size:1.5rem;margin:0;letter-spacing:-.01em;}

  .skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;border:1px solid var(--line);}
  .skill-group{padding:20px 22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
  .skill-group h3{font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--steel);margin:0 0 12px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-family:'Space Mono',monospace;font-size:.68rem;background:var(--panel);border:1px solid var(--line);padding:4px 8px;border-radius:var(--radius);}

  .proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;}
  .proj-card{position:relative;background:var(--panel);padding:0 0 20px;border:1px solid var(--line);overflow:hidden;cursor:pointer;text-align:left;}
  .proj-card-inner{padding:20px 22px 0;}
  .proj-card::before,.proj-card::after{content:"";position:absolute;width:14px;height:14px;pointer-events:none;z-index:2;}
  .proj-card::before{top:-1px;left:-1px;border-top:2px solid var(--accent);border-left:2px solid var(--accent);}
  .proj-card::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);}
  .proj-img{width:100%;height:160px;object-fit:cover;display:block;border-bottom:1px solid var(--line);}
  .proj-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .status-badge{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;padding:3px 7px;border-radius:var(--radius);}
  .status-completed{background:var(--accent2);color:#fff;}
  .status-progress{background:var(--accent3);color:#1C2430;}
  .cat-badge{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;padding:3px 7px;border-radius:var(--radius);border:1px solid var(--steel);color:var(--steel);}
  .proj-title{font-size:1.08rem;font-weight:700;margin:2px 0 2px;}
  .proj-meta{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--steel);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
  .proj-desc{font-size:.88rem;color:#333;margin-bottom:12px;}
  .proj-stat{display:inline-block;font-family:'Space Mono',monospace;font-size:.68rem;background:var(--accent);color:#fff;padding:4px 8px;border-radius:var(--radius);margin-bottom:4px;}
  .proj-view-more{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--accent4);text-transform:uppercase;letter-spacing:.05em;}

  .detail-hero{width:100%;max-height:340px;object-fit:cover;border:1px solid var(--line);margin-bottom:26px;}
  .detail-block{margin-bottom:26px;max-width:760px;}
  .detail-block h4{font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--steel);margin:0 0 8px;}
  .detail-block p{margin:0;color:#2a2f36;}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:8px;}
  .gallery-item{position:relative;border:1px solid var(--line);}
  .gallery-item img{width:100%;height:130px;object-fit:cover;display:block;}
  .gallery-tag{position:absolute;bottom:0;left:0;right:0;background:rgba(28,36,48,.75);color:#fff;font-family:'Space Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;padding:3px 6px;}
  .video-block{margin-top:8px;}
  .video-block iframe,.video-block video{width:100%;max-width:640px;aspect-ratio:16/9;border:1px solid var(--line);}
  .video-caption{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--steel);margin-top:4px;}

  .timeline{border-left:2px solid var(--line);padding-left:26px;position:relative;}
  .tl-item{position:relative;padding-bottom:30px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-item::before{content:"";position:absolute;left:-31px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--dot,var(--accent));}
  .tl-role{font-weight:700;}
  .tl-org{color:var(--steel);font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;}
  .tl-date{float:right;font-family:'Space Mono',monospace;font-size:.68rem;color:var(--steel);}
  .tl-item ul{margin:8px 0 0;padding-left:18px;font-size:.88rem;color:#333;}
  .tl-item li{margin-bottom:4px;}

  .edu-item{border:1px solid var(--line);padding:18px 20px;margin-bottom:14px;background:var(--panel);}
  .edu-item h3{margin:0 0 2px;font-size:1rem;}
  .edu-sub{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--steel);text-transform:uppercase;letter-spacing:.05em;}

  .list-item{border:1px solid var(--line);padding:16px 20px;margin-bottom:12px;background:var(--panel);}
  .list-item h3{margin:0 0 2px;font-size:.98rem;}
  .list-item .meta{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--steel);text-transform:uppercase;letter-spacing:.05em;}
  .list-item p{margin:6px 0 0;font-size:.88rem;color:#333;}

  .resume-frame{width:100%;height:80vh;border:1px solid var(--line);margin-top:22px;}

  footer{border-top:2px solid var(--ink);padding:36px 0 50px;max-width:1080px;margin:0 auto;padding-left:28px;padding-right:28px;}
  .foot-grid{display:flex;flex-wrap:wrap;gap:34px;justify-content:space-between;align-items:flex-end;}
  .foot-grid a{color:var(--ink);text-decoration:none;font-family:'Space Mono',monospace;font-size:.78rem;}
  .foot-grid a:hover{color:var(--accent);}

  .settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:2px solid var(--ink);flex-shrink:0;}
  .settings-header h3{font-family:'Space Mono',monospace;font-size:1rem;margin:0;text-transform:uppercase;letter-spacing:.06em;}
  .settings-close{background:none;border:1px solid var(--line);padding:6px 12px;font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);}
  .settings-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line);flex-shrink:0;}
  .settings-tab-btn{font-family:'Space Mono',monospace;font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;border:1px solid var(--line);background:var(--panel);color:var(--steel);cursor:pointer;border-radius:var(--radius);}
  .settings-tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .settings-body{flex:1;overflow:auto;padding:20px;max-width:720px;margin:0 auto;width:100%;}
  .settings-footer{border-top:1px solid var(--line);padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;}
  .settings-field{margin-bottom:14px;}
  .settings-field label{display:block;font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);margin-bottom:5px;}
  .settings-field input, .settings-field textarea, .settings-field select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:.85rem;background:#fff;}
  .settings-field textarea{min-height:70px;}
  .settings-card{border:1px solid var(--line);background:var(--panel);padding:16px;margin-bottom:16px;}
  .settings-hint{font-size:.78rem;color:var(--steel);margin-bottom:16px;}
  .thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .thumb{position:relative;width:70px;height:70px;border:1px solid var(--line);}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb button{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#b33;color:#fff;border:none;font-size:.6rem;cursor:pointer;line-height:1;}

  @media (max-width:640px){ .titleblock{grid-template-columns:repeat(2,1fr);} .tl-date{float:none;display:block;margin-top:4px;} }
</style>
</head>

<script>
const els = { app: document.getElementById('app') };
const accentCycle = ['var(--accent)','var(--accent2)','var(--accent3)','var(--accent4)'];
function esc(str){ const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }

function timelineHTML(list, colorVar){
  return `<div class="timeline">` + list.map(item => `
    <div class="tl-item" style="--dot:${colorVar}">
      <span class="tl-date mono">${esc(item.date)}</span>
      <div class="tl-role">${esc(item.role)}</div>
      <div class="tl-org">${esc(item.org)}${item.location ? ' — ' + esc(item.location) : ''}</div>
      ${item.bullets && item.bullets.length ? `<ul>${item.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>` : ''}
    </div>`).join('') + `</div>`;
}
function listSectionHTML(list, fields){
  return list.map(item => `
    <div class="list-item" style="${item.image? 'display:flex;gap:14px;align-items:flex-start;':''}">
      ${item.image?`<img src="${item.image}" alt="${esc(item[fields.title]||'')}" style="width:56px;height:56px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;">`:''}

        <h3>${esc(item[fields.title])}</h3>
        ${fields.meta ? `<div class="meta">${fields.meta.map(f=>item[f]).filter(Boolean).map(esc).join(' — ')}</div>` : ''}
        ${fields.desc && item[fields.desc] ? `<p>${esc(item[fields.desc])}</p>` : ''}
        ${fields.url && item[fields.url] ? `<p><a href="${esc(item[fields.url])}" target="_blank" rel="noopener">View →</a></p>` : ''}

}
function renderProjects(){
  return `<div class="proj-grid">` + SITE.projects.map(p => `
    <button class="proj-card" onclick="showProjectDetail('${p.id}')">
      ${p.heroImage ? `<img class="proj-img" src="${p.heroImage}" alt="${esc(p.title)}">` : ''}
      <div class="proj-card-inner">
        <div class="proj-badge-row">
          ${p.status ? `<span class="status-badge ${p.status==='Completed'?'status-completed':'status-progress'}">${esc(p.status)}</span>` : ''}
          ${p.category ? `<span class="cat-badge">${esc(p.category)}</span>` : ''}

        <div class="proj-title">${esc(p.title)}</div>
        ${p.date ? `<div class="proj-meta">${esc(p.date)}</div>` : ''}
        ${p.shortDescription ? `<div class="proj-desc">${esc(p.shortDescription)}</div>` : ''}

}
function galleryDetailHTML(gallery){
  if(!gallery || !gallery.length) return '';
  return `<div class="detail-block"><h4>Gallery</h4><div class="gallery-grid">` +
    gallery.map(g => `<div class="gallery-item"><img src="${g.src}" alt="${esc(g.caption||'')}">${g.type?`<span class="gallery-tag">${esc(g.type)}</span>`:''}</div>`).join('') +
  `</div></div>`;
}
function videosHTML(videos){
  if(!videos || !videos.length) return '';
  return `<div class="detail-block"><h4>Videos</h4>` + videos.map(v => {
    const isEmbed = /youtube\.com|youtu\.be|vimeo\.com/.test(v.url||'');

    return `<div class="video-block">${media}${v.caption?`<div class="video-caption">${esc(v.caption)}</div>`:''}</div>`;

function textBlock(label, value){ if(!value) return ''; return `<div class="detail-block"><h4>${label}</h4><p>${esc(value)}</p></div>`; }
function renderProjectDetail(p){
  return `
    <button class="back-btn" onclick="showView('view-projects')">← All projects</button>

      ${p.status ? `<span class="status-badge ${p.status==='Completed'?'status-completed':'status-progress'}">${esc(p.status)}</span>` : ''}

function renderTitleblock(){

    ${SITE.profile.email?`<div><span class="tb-label">Email</span><a class="tb-value" href="mailto:${SITE.profile.email}">${esc(SITE.profile.email)}</a></div>`:''}

let nowIndex = 0;
function renderNowCard(){
  const list = SITE.now;
  if(!list.length) return '';
  const order = list.slice().reverse();
  if(nowIndex >= order.length) nowIndex = 0;
  const n = order[nowIndex];
  const dots = order.map((_,i) => `<button class="now-dot ${i===nowIndex?'active':''}" onclick="jumpNow(${i})"></button>`).join('');
  return `
    <div class="now-card">
      <div class="now-head"><h2 class="mono">What I'm doing now</h2></div>
      <div class="now-carousel">
        ${order.length>1?`<button class="now-nav" onclick="stepNow(-1)">‹</button>`:''}
        <div class="now-slide">
          ${n.image?`<img class="now-img" src="${n.image}" alt="update photo">`:''}
          <div>
            ${n.date?`<div class="now-date">${esc(n.date)}</div>`:''}
            <div class="now-text">${esc(n.activity)}</div>
            ${n.with?`<div class="now-with">with ${esc(n.with)}</div>`:''}
          </div>
        </div>
        ${order.length>1?`<button class="now-nav" onclick="stepNow(1)">›</button>`:''}
      </div>
      ${order.length>1?`<div class="now-dots">${dots}</div>`:''}

}
function stepNow(dir){ const len = SITE.now.length; nowIndex = (nowIndex + dir + len) % len; document.querySelector('#now-slot').innerHTML = renderNowCard(); }
function jumpNow(i){ nowIndex = i; document.querySelector('#now-slot').innerHTML = renderNowCard(); }

  const list = SITE.gallery;

        ${list.length>1?`<button class="photo-nav next" onclick="stepGal(1)">›</button>`:''}
      </div>
      ${list.length>1?`<div class="photo-dots">${dots}</div>`:''}

}
function stepGal(dir){ const len = SITE.gallery.length; galIndex = (galIndex + dir + len) % len; document.querySelector('#gallery-slot').innerHTML = renderGallerySlideshow(); }
function jumpGal(i){ galIndex = i; document.querySelector('#gallery-slot').innerHTML = renderGallerySlideshow(); }
window.stepGal = stepGal; window.jumpGal = jumpGal;

const sectionsConfig = [
  { key:'projects', label:'Projects', render: renderProjects, hasContent:()=>SITE.projects.length>0 },
  { key:'experience', label:'Experience', render:()=>timelineHTML(SITE.experience,'var(--accent)'), hasContent:()=>SITE.experience.length>0 },
  { key:'leadership', label:'Leadership', render:()=>timelineHTML(SITE.leadership,'var(--accent2)'), hasContent:()=>SITE.leadership.length>0 },

  { key:'publications', label:'Publications', render:()=>listSectionHTML(SITE.publications, {title:'title', meta:['venue','date'], url:'url'}), hasContent:()=>SITE.publications.length>0 },

function buildMenu(active){
  const dropdown = document.getElementById('menu-dropdown');
  dropdown.innerHTML = `<button onclick="closeMenuAnd('view-home')">Home</button>` +
    active.map(s => `<button onclick="closeMenuAnd('view-${s.key}')">${s.label}</button>`).join('') +

function buildApp(){
  const active = sectionsConfig.filter(s => s.hasContent());
  const homeView = `
    <div class="view active" id="view-home">
      <div class="sheet">
        <span class="eyebrow">${esc(SITE.profile.title)} — ${esc(SITE.profile.location)}</span>

          ${SITE.projects.length ? `<button class="quicklink-btn" onclick="showView('view-projects')">View Projects</button>` : ''}
          ${SITE.resume.fileUrl ? `<a class="quicklink-btn secondary" href="${SITE.resume.fileUrl}" download>${esc(SITE.resume.label||'Resume')}</a>` : ''}

  const sectionViews = active.map((s, idx) => `

  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));

  el.classList.add('active');

}

document.getElementById('menu-toggle').onclick = () => document.getElementById('menu-dropdown').classList.toggle('open');
document.addEventListener('click', (e) => {
  const dd = document.getElementById('menu-dropdown'); const toggle = document.getElementById('menu-toggle');
  if(dd.classList.contains('open') && !dd.contains(e.target) && e.target !== toggle){ dd.classList.remove('open'); }
});

function resizeImage(file, maxW){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
let pendingImageCallback = null;
document.getElementById('settings-file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file || !pendingImageCallback) return;
  const dataUrl = await resizeImage(file, 900);
  pendingImageCallback(dataUrl);
  e.target.value = '';
};
function pickImage(cb){ pendingImageCallback = cb; document.getElementById('settings-file-input').click(); }
window.pickImage = pickImage;

const passModal = document.getElementById('pass-modal');
let passMode = null;
function openSettingsGate(){
  const stored = localStorage.getItem('kc-settings-pass');
  passMode = stored ? 'unlock' : 'setup';
  document.getElementById('pass-modal-title').textContent = stored ? 'Enter settings password' : 'Set a settings password';
  document.getElementById('pass-modal-desc').textContent = stored
    ? 'Enter your password to edit site content.'
    : "Choose a password for this browser. It's a light deterrent, not real encryption — anyone determined could view the page source and bypass it, so don't store anything truly sensitive here.";
  document.getElementById('pass-input').value = '';
  passModal.classList.add('open');
  setTimeout(()=>document.getElementById('pass-input').focus(), 50);
}
function openSettings(){
  editableSite = JSON.parse(JSON.stringify(SITE));
  renderSettingsTabs();
  switchSettingsTab('profile');
  document.getElementById('settings-overlay').classList.add('open');
}
document.getElementById('pass-cancel').onclick = () => passModal.classList.remove('open');
document.getElementById('pass-input').addEventListener('keydown', e => { if(e.key==='Enter') confirmPass(); });
document.getElementById('pass-confirm').onclick = confirmPass;
function confirmPass(){
  const val = document.getElementById('pass-input').value.trim();
  if(!val) return;
  if(passMode === 'setup'){
    localStorage.setItem('kc-settings-pass', val);
    passModal.classList.remove('open');
    openSettings();
  } else {
    const stored = localStorage.getItem('kc-settings-pass');
    if(val === stored){ passModal.classList.remove('open'); openSettings(); }
    else { document.getElementById('pass-modal-desc').textContent = "That password doesn't match. Try again."; }
  }
}
document.getElementById('settings-close').onclick = () => document.getElementById('settings-overlay').classList.remove('open');

let editableSite = null;
const SETTINGS_TABS = ['profile','photos','now','projects','experience','leadership','volunteer','skills','education','certifications','awards','publications','blog','resume','account'];
const TAB_LABELS = {profile:'Profile',photos:'Photos',now:'Now',projects:'Projects',experience:'Experience',leadership:'Leadership',volunteer:'Volunteer',skills:'Skills',education:'Education',certifications:'Certs',awards:'Awards',publications:'Publications',blog:'Blog',resume:'Resume',account:'Account'};
let activeTab = 'profile';

function renderSettingsTabs(){
  document.getElementById('settings-tabs').innerHTML = SETTINGS_TABS.map(t =>
    `<button class="settings-tab-btn" data-tab="${t}" onclick="switchSettingsTab('${t}')">${TAB_LABELS[t]}</button>`).join('');
}
function switchSettingsTab(t){
  activeTab = t;
  document.querySelectorAll('.settings-tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  document.getElementById('settings-body').innerHTML = TAB_RENDERERS[t]();
}
window.switchSettingsTab = switchSettingsTab;

function field(path, label, value, type){
  type = type || 'text';
  if(type==='textarea') return `<div class="settings-field"><label>${label}</label><textarea data-path="${path}">${esc(value||'')}</textarea></div>`;
  return `<div class="settings-field"><label>${label}</label><input data-path="${path}" data-type="${type}" value="${esc(value||'')}"></div>`;
}
function getPath(obj, path){ return path.split('.').reduce((o,k)=> (o==null?o:o[k]), obj); }
function setPath(obj, path, value){
  const keys = path.split('.'); let cur = obj;
  for(let i=0;i<keys.length-1;i++){ cur = cur[keys[i]]; }
  cur[keys[keys.length-1]] = value;
}
document.getElementById('settings-body').addEventListener('input', (e) => {
  const t = e.target;
  if(!t.dataset.path) return;
  let val = t.value;
  if(t.dataset.arr === 'comma') val = val.split(',').map(s=>s.trim()).filter(Boolean);
  else if(t.dataset.arr === 'lines') val = val.split('\n').map(s=>s.trim()).filter(Boolean);
  setPath(editableSite, t.dataset.path, val);
});

        <option value="In Progress" ${p.status==='In Progress'?'selected':''}>In Progress</option>
      </select></div>
      ${field(`projects.${i}.shortDescription`,'Short description', p.shortDescription,'textarea')}
      <div class="settings-field"><label>Technologies (comma separated)</label><input data-path="projects.${i}.technologies" data-arr="comma" value="${esc((p.technologies||[]).join(', '))}"></div>
      ${field(`projects.${i}.problem`,'Problem', p.problem,'textarea')}
      ${field(`projects.${i}.solution`,'Solution', p.solution,'textarea')}
      ${field(`projects.${i}.process`,'Design process', p.process,'textarea')}
      ${field(`projects.${i}.challenges`,'Challenges', p.challenges,'textarea')}
      ${field(`projects.${i}.lessonsLearned`,'Lessons learned', p.lessonsLearned,'textarea')}
      ${field(`projects.${i}.outcome`,'Outcome', p.outcome,'textarea')}
      ${field(`projects.${i}.stat`,'Highlight stat (optional badge)', p.stat)}
      <p class="settings-hint">Gallery images and videos for this project still need to be added in the data block directly — an advanced option for later.</p>
      <button type="button" class="btn ghost small" onclick="removeItem('projects',${i})">Remove this project</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('projects',{id:'project-'+Date.now(),title:'',category:'',date:'',status:'In Progress',shortDescription:'',technologies:[],heroImage:'',gallery:[],videos:[],problem:'',solution:'',process:'',challenges:'',lessonsLearned:'',outcome:'',stat:''})">+ Add project</button>`,
  experience: () => genericList('experience','Position'),
  leadership: () => genericList('leadership','Leadership role'),
  volunteer: () => genericList('volunteer','Volunteer role'),
  education: () => editableSite.education.map((e,i) => `
    <div class="settings-card">
      ${field(`education.${i}.degree`,'Degree', e.degree)}
      ${field(`education.${i}.school`,'School', e.school)}
      ${field(`education.${i}.date`,'Date', e.date)}
      <button type="button" class="btn ghost small" onclick="removeItem('education',${i})">Remove</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('education',{degree:'',school:'',date:''})">+ Add education</button>`,
  certifications: () => editableSite.certifications.map((c,i) => `
    <div class="settings-card">
      ${c.image?`<div class="thumb-row"><div class="thumb"><img src="${c.image}"><button onclick="editableSite.certifications[${i}].image='';switchSettingsTab('certifications')">✕</button></div></div>`:''}
      <button type="button" class="btn small ghost" style="margin-bottom:10px;" onclick="pickImage(function(url){ editableSite.certifications[${i}].image=url; switchSettingsTab('certifications'); })">📷 ${c.image?'Replace':'Add'} photo</button>
      ${field(`certifications.${i}.name`,'Name', c.name)}
      ${field(`certifications.${i}.issuer`,'Issuer', c.issuer)}
      ${field(`certifications.${i}.date`,'Date', c.date)}
      <button type="button" class="btn ghost small" onclick="removeItem('certifications',${i})">Remove</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('certifications',{name:'',issuer:'',date:'',image:''})">+ Add certification</button>`,
  awards: () => simpleList('awards','name','issuer','date'),
  publications: () => editableSite.publications.map((p,i) => `
    <div class="settings-card">
      ${field(`publications.${i}.title`,'Title', p.title)}
      ${field(`publications.${i}.venue`,'Venue', p.venue)}
      ${field(`publications.${i}.date`,'Date', p.date)}
      ${field(`publications.${i}.url`,'URL', p.url)}
      <button type="button" class="btn ghost small" onclick="removeItem('publications',${i})">Remove</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('publications',{title:'',venue:'',date:'',url:''})">+ Add publication</button>`,
  blog: () => editableSite.blog.map((p,i) => `
    <div class="settings-card">
      ${field(`blog.${i}.title`,'Title', p.title)}
      ${field(`blog.${i}.date`,'Date', p.date)}
      ${field(`blog.${i}.summary`,'Summary', p.summary,'textarea')}
      ${field(`blog.${i}.url`,'URL', p.url)}
      <button type="button" class="btn ghost small" onclick="removeItem('blog',${i})">Remove</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('blog',{title:'',date:'',summary:'',url:''})">+ Add post</button>`,
  skills: () => editableSite.skills.map((g,i) => `
    <div class="settings-card">
      ${field(`skills.${i}.category`,'Category name', g.category)}
      <div class="settings-field"><label>Skills (comma separated)</label><input data-path="skills.${i}.items" data-arr="comma" value="${esc((g.items||[]).join(', '))}"></div>
      <button type="button" class="btn ghost small" onclick="removeItem('skills',${i})">Remove this category</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('skills',{category:'',items:[]})">+ Add skill category</button>`,
  account: () => `
    <p class="settings-hint">Change the password used to unlock Settings on this browser.</p>
    <div class="settings-field"><label>Current password</label><input type="password" id="acct-current"></div>
    <div class="settings-field"><label>New password</label><input type="password" id="acct-new"></div>
    <div class="settings-field"><label>Confirm new password</label><input type="password" id="acct-confirm"></div>
    <button type="button" class="btn" onclick="updateSettingsPassword()">Update password</button>
    <p id="acct-msg" class="settings-hint" style="margin-top:10px;"></p>
  `
};

function updateSettingsPassword(){
  const current = document.getElementById('acct-current').value;
  const next = document.getElementById('acct-new').value;
  const confirm = document.getElementById('acct-confirm').value;
  const msg = document.getElementById('acct-msg');
  const stored = localStorage.getItem('kc-settings-pass');
  if(current !== stored){ msg.textContent = "Current password doesn't match."; msg.style.color = '#b33'; return; }
  if(!next){ msg.textContent = "Enter a new password."; msg.style.color = '#b33'; return; }
  if(next !== confirm){ msg.textContent = "New password and confirmation don't match."; msg.style.color = '#b33'; return; }
  localStorage.setItem('kc-settings-pass', next);
  msg.textContent = "Password updated for this browser.";
  msg.style.color = 'var(--accent2)';
  document.getElementById('acct-current').value = '';
  document.getElementById('acct-new').value = '';
  document.getElementById('acct-confirm').value = '';
}
window.updateSettingsPassword = updateSettingsPassword;

function genericList(arrPath, itemLabel){
  const schemaFields = [
    {key:'role', label:'Role'}, {key:'org', label:'Organization'}, {key:'location', label:'Location'}, {key:'date', label:'Date'}
  ];
  return editableSite[arrPath].map((item,i) => `
    <div class="settings-card">
      ${schemaFields.map(f => field(`${arrPath}.${i}.${f.key}`, f.label, item[f.key])).join('')}
      <div class="settings-field"><label>Bullets (one per line)</label><textarea data-path="${arrPath}.${i}.bullets" data-arr="lines">${esc((item.bullets||[]).join('\n'))}</textarea></div>
      <button type="button" class="btn ghost small" onclick="removeItem('${arrPath}',${i})">Remove this ${itemLabel.toLowerCase()}</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('${arrPath}',{role:'',org:'',location:'',date:'',bullets:[]})">+ Add ${itemLabel}</button>`;
}
function simpleList(arrPath, f1, f2, f3){
  return editableSite[arrPath].map((item,i) => `
    <div class="settings-card">
      ${field(`${arrPath}.${i}.${f1}`, f1[0].toUpperCase()+f1.slice(1), item[f1])}
      ${field(`${arrPath}.${i}.${f2}`, f2[0].toUpperCase()+f2.slice(1), item[f2])}
      ${field(`${arrPath}.${i}.${f3}`, f3[0].toUpperCase()+f3.slice(1), item[f3])}
      <button type="button" class="btn ghost small" onclick="removeItem('${arrPath}',${i})">Remove</button>
    </div>`).join('') + `<button type="button" class="btn" onclick="addItem('${arrPath}',{${f1}:'',${f2}:'',${f3}:''})">+ Add</button>`;
}
function removeItem(arrPath, i){ editableSite[arrPath].splice(i,1); switchSettingsTab(activeTab); }
function addItem(arrPath, blank){ editableSite[arrPath].push(blank); switchSettingsTab(activeTab); }
function removeGalleryPhoto(i){ editableSite.gallery.splice(i,1); switchSettingsTab('photos'); }
window.removeItem = removeItem; window.addItem = addItem; window.removeGalleryPhoto = removeGalleryPhoto; window.setPath = setPath;

document.getElementById('settings-preview').onclick = () => {
  Object.assign(SITE, JSON.parse(JSON.stringify(editableSite)));
  buildApp();
  showView('view-home');
  document.getElementById('settings-overlay').classList.remove('open');
};
document.getElementById('settings-download').onclick = () => {
  document.getElementById('menu-dropdown').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('open');
  document.getElementById('pass-modal').classList.remove('open');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-home').classList.add('active');

  const dataScript = document.getElementById('site-data');
  const oldDataText = dataScript.textContent;
  const newDataText = oldDataText.replace(/const SITE = \{[\s\S]*\};/, 'const SITE = ' + JSON.stringify(editableSite, null, 2) + ';');
  const fullHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML.replace(oldDataText, newDataText);

  const blob = new Blob([fullHtml], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'index.html'; a.click();
  URL.revokeObjectURL(url);

  document.getElementById('settings-overlay').classList.add('open');
};

buildApp();
</script>
</body>
</html>
