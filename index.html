<style>

    --paper:#EDEEE9;
    --panel:#F6F6F2;
    --ink:#1C2430;
    --line:#C6CCC2;
    --accent:#E8622C;
    --accent2:#2F8F76;
    --accent3:#E8AA3C;
    --accent4:#3B72C4;
    --steel:#4C6478;
    --steel-light:#DCE3E7;

  *{box-sizing:border-box;}

  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}

  #menu-toggle{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--line);color:var(--ink);font-family:'Space Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;padding:7px 12px;border-radius:var(--radius);cursor:pointer;}

  #menu-dropdown{

  #menu-dropdown.open{display:block;}
  #menu-dropdown button{
    display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);
    font-family:'Space Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;
    padding:12px 16px;cursor:pointer;color:var(--ink);

  #menu-dropdown button:hover{background:var(--steel-light);color:var(--accent4);}

  .tagline{max-width:620px;color:#3a4350;}
  .bio-text{max-width:620px;color:#333;margin-top:14px;}

  .now-date{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
  .now-text{font-size:.92rem;color:#2a2f36;margin-bottom:4px;}
  .now-with{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--steel);}
  .now-dots{display:flex;gap:6px;justify-content:center;padding-bottom:14px;}
  .now-dot{width:6px;height:6px;border-radius:50%;background:var(--line);border:none;cursor:pointer;padding:0;}
  .now-dot.active{background:var(--accent4);}

  .index-title{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;flex:1;}

  .foot-grid a:hover{color:var(--accent);}
  .foot-note{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--steel);}

  #tools-fab{position:fixed;bottom:18px;right:18px;z-index:90;display:none;background:var(--ink);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25);}
  body.tools-enabled #tools-fab{display:block;}
  .panel{position:fixed;bottom:0;left:0;right:0;z-index:95;background:var(--ink);color:var(--paper);padding:16px 20px;display:none;max-height:75vh;overflow:auto;}
  .panel.open{display:block;}
  .panel .inner{max-width:640px;margin:0 auto;}
  .panel h4{font-family:'Space Mono',monospace;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px;}
  .panel p.hint{font-size:.8rem;color:#B9C4CE;margin:0 0 14px;}
  .panel input[type="file"]{padding:6px 0;color:#fff;font-family:'Inter',sans-serif;font-size:.85rem;}
  .panel textarea{width:100%;min-height:90px;padding:8px 10px;border-radius:var(--radius);border:1px solid #45505f;background:#232C39;color:#fff;font-family:'Space Mono',monospace;font-size:.7rem;margin-top:10px;}
  .panel .row-btns{margin-top:14px;display:flex;gap:10px;}
  .btn{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--accent4);background:var(--accent4);color:#fff;cursor:pointer;}
  .btn.ghost{background:none;color:#B9C4CE;border-color:#45505f;}
  .close-panel{position:absolute;top:12px;right:18px;background:none;border:none;color:#B9C4CE;font-size:1.1rem;cursor:pointer;}

  @media (max-width:640px){ .titleblock{grid-template-columns:repeat(2,1fr);} .tl-date{float:none;display:block;margin-top:4px;} }
</style>
</head>

const els = { app: document.getElementById('app') };
const accentCycle = ['var(--accent)','var(--accent2)','var(--accent3)','var(--accent4)'];

function esc(str){ const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }

function timelineHTML(list, colorVar){
  return `<div class="timeline">` + list.map(item => `
    <div class="tl-item" style="--dot:${colorVar}">
      <span class="tl-date mono">${esc(item.date)}</span>
      <div class="tl-role">${esc(item.role)}</div>
      <div class="tl-org">${esc(item.org)}${item.location ? ' — ' + esc(item.location) : ''}</div>
      ${item.bullets && item.bullets.length ? `<ul>${item.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>` : ''}
    </div>`).join('') + `</div>`;
}

function listSectionHTML(list, fields){
  return list.map(item => `
    <div class="list-item">
      <h3>${esc(item[fields.title])}</h3>
      ${fields.meta ? `<div class="meta">${fields.meta.map(f=>item[f]).filter(Boolean).map(esc).join(' — ')}</div>` : ''}
      ${fields.desc && item[fields.desc] ? `<p>${esc(item[fields.desc])}</p>` : ''}
      ${fields.url && item[fields.url] ? `<p><a href="${esc(item[fields.url])}" target="_blank" rel="noopener">View →</a></p>` : ''}
    </div>`).join('');
}

function renderProjects(){
  return `<div class="proj-grid">` + SITE.projects.map(p => `
    <button class="proj-card" onclick="showProjectDetail('${p.id}')">
      ${p.heroImage ? `<img class="proj-img" src="${p.heroImage}" alt="${esc(p.title)}">` : ''}
      <div class="proj-card-inner">
        <div class="proj-badge-row">
          ${p.status ? `<span class="status-badge ${p.status==='Completed'?'status-completed':'status-progress'}">${esc(p.status)}</span>` : ''}
          ${p.category ? `<span class="cat-badge">${esc(p.category)}</span>` : ''}
        </div>
        <div class="proj-title">${esc(p.title)}</div>
        ${p.date ? `<div class="proj-meta">${esc(p.date)}</div>` : ''}
        ${p.shortDescription ? `<div class="proj-desc">${esc(p.shortDescription)}</div>` : ''}
        ${p.technologies && p.technologies.length ? `<div class="chip-row" style="margin-bottom:10px;">${p.technologies.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>` : ''}
        ${p.stat ? `<span class="proj-stat">${esc(p.stat)}</span><br>` : ''}
        <span class="proj-view-more">View details →</span>
      </div>
    </button>`).join('') + `</div>`;
}

function galleryHTML(gallery){
  if(!gallery || !gallery.length) return '';
  return `<div class="detail-block"><h4>Gallery</h4><div class="gallery-grid">` +
    gallery.map(g => `<div class="gallery-item"><img src="${g.src}" alt="${esc(g.caption||'')}">${g.type?`<span class="gallery-tag">${esc(g.type)}</span>`:''}</div>`).join('') +
  `</div></div>`;
}

function videosHTML(videos){
  if(!videos || !videos.length) return '';
  return `<div class="detail-block"><h4>Videos</h4>` + videos.map(v => {
    const isEmbed = /youtube\.com|youtu\.be|vimeo\.com/.test(v.url||'');
    const media = isEmbed ? `<iframe src="${v.url}" frameborder="0" allowfullscreen></iframe>` : `<video src="${v.url}" controls></video>`;
    return `<div class="video-block">${media}${v.caption?`<div class="video-caption">${esc(v.caption)}</div>`:''}</div>`;
  }).join('') + `</div>`;
}

function textBlock(label, value){
  if(!value) return '';
  return `<div class="detail-block"><h4>${label}</h4><p>${esc(value)}</p></div>`;
}

function renderProjectDetail(p){
  return `
    <button class="back-btn" onclick="showView('view-projects')">← All projects</button>
    <div class="proj-badge-row">
      ${p.status ? `<span class="status-badge ${p.status==='Completed'?'status-completed':'status-progress'}">${esc(p.status)}</span>` : ''}
      ${p.category ? `<span class="cat-badge">${esc(p.category)}</span>` : ''}
    </div>
    <h2 style="font-size:1.8rem;margin:6px 0 4px;">${esc(p.title)}</h2>
    ${p.date ? `<div class="proj-meta" style="margin-bottom:20px;">${esc(p.date)}</div>` : ''}
    ${p.heroImage ? `<img class="detail-hero" src="${p.heroImage}" alt="${esc(p.title)}">` : ''}
    ${p.technologies && p.technologies.length ? `<div class="chip-row" style="margin-bottom:26px;">${p.technologies.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>` : ''}
    ${textBlock('Problem', p.problem)}
    ${textBlock('Solution', p.solution)}
    ${textBlock('Design process', p.process)}
    ${textBlock('Challenges', p.challenges)}
    ${textBlock('Lessons learned', p.lessonsLearned)}
    ${textBlock('Outcome', p.outcome)}
    ${galleryHTML(p.gallery)}
    ${videosHTML(p.videos)}
  `;
}

function showProjectDetail(id){
  const p = SITE.projects.find(pr => pr.id === id);
  if(!p) return;
  document.getElementById('view-project-detail').innerHTML = `<div class="sheet">${renderProjectDetail(p)}</div>`;
  showView('view-project-detail');
}
window.showProjectDetail = showProjectDetail;

function renderSkills(){
  return `<div class="skills-grid">` + SITE.skills.map(g => `
    <div class="skill-group">
      <h3>${esc(g.category)}</h3>
      <div class="chip-row">${g.items.map(i=>`<span class="chip">${esc(i)}</span>`).join('')}</div>
    </div>`).join('') + `</div>`;
}

function renderEducation(){
  return SITE.education.map(e => `
    <div class="edu-item">
      <h3>${esc(e.degree)}</h3>
      <span class="edu-sub">${esc(e.school)}${e.date?' — '+esc(e.date):''}</span>
    </div>`).join('');
}

function renderResume(){
  const r = SITE.resume;
  const isPdf = /\.pdf($|\?)/i.test(r.fileUrl||'');
  return `
    <a class="quicklink-btn" href="${r.fileUrl}" download>${esc(r.label || 'Download Resume')}</a>
    ${isPdf ? `<iframe class="resume-frame" src="${r.fileUrl}"></iframe>` : ''}
  `;
}

function renderTitleblock(){
  return `<div class="titleblock">
    <div><span class="tb-label">I Am</span><span class="tb-value">${esc(SITE.profile.name)}</span></div>
    ${SITE.profile.phone?`<div><span class="tb-label">Phone</span><a class="tb-value" href="tel:${SITE.profile.phone.replace(/[^0-9+]/g,'')}">${esc(SITE.profile.phone)}</a></div>`:''}
    ${SITE.profile.email?`<div><span class="tb-label">Email</span><a class="tb-value" href="mailto:${SITE.profile.email}">${esc(SITE.profile.email)}</a></div>`:''}
    ${SITE.profile.linkedin?`<div><span class="tb-label">LinkedIn</span><a class="tb-value" href="${SITE.profile.linkedin}" target="_blank" rel="noopener">${esc(SITE.profile.linkedin.replace('https://www.linkedin.com',''))}</a></div>`:''}
  </div>`;
}

// ---- now slideshow ----
let nowIndex = 0;
function renderNowCard(){
  const list = SITE.now;
  if(!list.length) return '';
  const order = list.slice().reverse();
  if(nowIndex >= order.length) nowIndex = 0;
  const n = order[nowIndex];
  const dots = order.map((_,i) => `<button class="now-dot ${i===nowIndex?'active':''}" onclick="jumpNow(${i})"></button>`).join('');
  return `
    <div class="now-card">
      <div class="now-head"><h2 class="mono">What I'm doing now</h2></div>
      <div class="now-carousel">
        ${order.length>1?`<button class="now-nav" onclick="stepNow(-1)">‹</button>`:''}
        <div class="now-slide">
          ${n.image?`<img class="now-img" src="${n.image}" alt="update photo">`:''}
          <div>
            ${n.date?`<div class="now-date">${esc(n.date)}</div>`:''}
            <div class="now-text">${esc(n.activity)}</div>
            ${n.with?`<div class="now-with">with ${esc(n.with)}</div>`:''}
          </div>
        </div>
        ${order.length>1?`<button class="now-nav" onclick="stepNow(1)">›</button>`:''}
      </div>
      ${order.length>1?`<div class="now-dots">${dots}</div>`:''}
    </div>`;
}
function stepNow(dir){
  const len = SITE.now.length;
  nowIndex = (nowIndex + dir + len) % len;
  document.querySelector('#now-slot').innerHTML = renderNowCard();
}
function jumpNow(i){ nowIndex = i; document.querySelector('#now-slot').innerHTML = renderNowCard(); }
window.stepNow = stepNow; window.jumpNow = jumpNow;

// ---- section registry — Projects first, per recruiter-priority order ----
const sectionsConfig = [
  { key:'projects', label:'Projects', render: renderProjects, hasContent:()=>SITE.projects.length>0 },
  { key:'experience', label:'Experience', render:()=>timelineHTML(SITE.experience,'var(--accent)'), hasContent:()=>SITE.experience.length>0 },
  { key:'leadership', label:'Leadership', render:()=>timelineHTML(SITE.leadership,'var(--accent2)'), hasContent:()=>SITE.leadership.length>0 },
  { key:'volunteer', label:'Volunteer', render:()=>timelineHTML(SITE.volunteer,'var(--accent3)'), hasContent:()=>SITE.volunteer.length>0 },
  { key:'certifications', label:'Certifications', render:()=>listSectionHTML(SITE.certifications, {title:'name', meta:['issuer','date']}), hasContent:()=>SITE.certifications.length>0 },
  { key:'skills', label:'Skills', render: renderSkills, hasContent:()=>SITE.skills.length>0 },
  { key:'education', label:'Education', render: renderEducation, hasContent:()=>SITE.education.length>0 },
  { key:'awards', label:'Awards', render:()=>listSectionHTML(SITE.awards, {title:'name', meta:['issuer','date']}), hasContent:()=>SITE.awards.length>0 },
  { key:'publications', label:'Publications', render:()=>listSectionHTML(SITE.publications, {title:'title', meta:['venue','date'], url:'url'}), hasContent:()=>SITE.publications.length>0 },
  { key:'blog', label:'Blog', render:()=>listSectionHTML(SITE.blog, {title:'title', meta:['date'], desc:'summary', url:'url'}), hasContent:()=>SITE.blog.length>0 },
  { key:'resume', label:'Resume', render: renderResume, hasContent:()=>!!SITE.resume.fileUrl },
  { key:'contact', label:'Contact', render:()=>renderTitleblock(), hasContent:()=>true }
];

function buildMenu(active){
  const dropdown = document.getElementById('menu-dropdown');
  dropdown.innerHTML = `<button onclick="closeMenuAnd('view-home')">Home</button>` +
    active.map(s => `<button onclick="closeMenuAnd('view-${s.key}')">${s.label}</button>`).join('');
}
function closeMenuAnd(viewId){
  document.getElementById('menu-dropdown').classList.remove('open');
  showView(viewId);
}
window.closeMenuAnd = closeMenuAnd;

function buildHomeIndex(active){
  // Projects/Resume/Contact already have prominent quick-link buttons — no need to repeat them here.
  const rest = active.filter(s => !['projects','resume','contact'].includes(s.key));
  return rest.map((s,i) => `
    <button class="index-item" onclick="showView('view-${s.key}')">
      <span class="index-num mono" style="color:${accentCycle[i % accentCycle.length]}">${String(i+1).padStart(2,'0')}</span>
      <span class="index-title">${s.label}</span>
      <span class="index-arrow">→</span>
    </button>`).join('');
}

function buildApp(){
  const active = sectionsConfig.filter(s => s.hasContent());

  const homeView = `
    <div class="view active" id="view-home">
      <div class="sheet">
        <span class="eyebrow">${esc(SITE.profile.title)} — ${esc(SITE.profile.location)}</span>
        <h1 class="name">${esc(SITE.profile.name).toUpperCase()}</h1>
        <p class="role">${esc(SITE.profile.title)}</p>
        <p class="tagline">${esc(SITE.profile.tagline)}</p>
        ${SITE.profile.bio ? `<p class="bio-text">${esc(SITE.profile.bio)}</p>` : ''}
        <div class="quicklinks">
          ${SITE.projects.length ? `<button class="quicklink-btn" onclick="showView('view-projects')">View Projects</button>` : ''}
          ${SITE.resume.fileUrl ? `<a class="quicklink-btn secondary" href="${SITE.resume.fileUrl}" download>${esc(SITE.resume.label||'Resume')}</a>` : ''}
          <button class="quicklink-btn secondary" onclick="showView('view-contact')">Contact</button>
        </div>
        <div id="now-slot">${renderNowCard()}</div>
        <div class="index-grid">${buildHomeIndex(active)}</div>
      </div>
    </div>`;

  const sectionViews = active.map((s, idx) => `
    <div class="view" id="view-${s.key}">
      <div class="sheet">
        <button class="back-btn" onclick="showView('view-home')">← Home</button>
        <div class="sec-head"><span class="sec-num" style="color:${accentCycle[idx % accentCycle.length]}">${String(idx+1).padStart(2,'0')}</span><h2>${s.label}</h2></div>
        ${s.render()}
      </div>
    </div>`).join('');

  const detailView = `<div class="view" id="view-project-detail"></div>`;

  els.app.innerHTML = homeView + sectionViews + detailView;
  buildMenu(active);

  document.getElementById('year').textContent = new Date().getFullYear();
  document.getElementById('foot-name').textContent = SITE.profile.name;
  if(SITE.profile.phone){ const a=document.getElementById('foot-phone'); a.href='tel:'+SITE.profile.phone.replace(/[^0-9+]/g,''); a.textContent=SITE.profile.phone; }
  if(SITE.profile.email){ const a=document.getElementById('foot-email'); a.href='mailto:'+SITE.profile.email; a.textContent=SITE.profile.email; }
  if(SITE.profile.linkedin){ document.getElementById('foot-linkedin').href = SITE.profile.linkedin; }
}

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el = document.getElementById(id);
  if(!el) return;
  void el.offsetWidth;
  el.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}
window.showView = showView;

document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('menu-dropdown').classList.toggle('open');
};
document.addEventListener('click', (e) => {
  const dd = document.getElementById('menu-dropdown');
  const toggle = document.getElementById('menu-toggle');
  if(dd.classList.contains('open') && !dd.contains(e.target) && e.target !== toggle){
    dd.classList.remove('open');
  }
});

// ---- owner-only image helper, revealed only via secret #tools link ----
function checkToolsAccess(){
  if(location.hash === '#tools'){ document.body.classList.add('tools-enabled'); }
}
checkToolsAccess();
window.addEventListener('hashchange', checkToolsAccess);

function resizeImage(file, maxW){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const imgPanel = document.getElementById('img-helper-panel');
document.getElementById('tools-fab').onclick = () => imgPanel.classList.add('open');
document.getElementById('close-img-helper').onclick = () => imgPanel.classList.remove('open');
document.getElementById('close-img-helper-2').onclick = () => imgPanel.classList.remove('open');
document.getElementById('img-helper-input').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const dataUrl = await resizeImage(file, 900);
  document.getElementById('img-helper-output').value = dataUrl;
};
document.getElementById('img-helper-copy').onclick = () => {
  const box = document.getElementById('img-helper-output');
  box.select();
  navigator.clipboard.writeText(box.value).catch(()=>document.execCommand('copy'));
};

buildApp();
</script>
</body>
</html>
